name: .NET 8 Windows Validation + Tailscale VPS

on:
  workflow_dispatch:
  schedule:
    - cron: '13 5,13,21 * * *'

jobs:
  build-test:
    runs-on: windows-2022
    timeout-minutes: 3600   # 60 ساعة (يمكن تمديد)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize Project
        run: |
          dotnet new console -n ValidationApp -f net8.0
          cd ValidationApp
          dotnet add package Newtonsoft.Json --version 13.0.3
          dotnet run -c Release

      - name: Setup RDP + Tailscale VPS (النسخة الناجحة)
        run: |
          # إنشاء يوزر RDP + باسورد قوي (زي الكود القديم الناجح)
          Add-Type -AssemblyName System.Security
          $charSet = @{ Upper=[char[]](65..90); Lower=[char[]](97..122); Number=[char[]](48..57); Special=[char[]](33..47)+[char[]](58..64)+[char[]](91..96)+[char[]](123..126) }
          $raw = @()
          $raw += $charSet.Upper | Get-Random -Count 4
          $raw += $charSet.Lower | Get-Random -Count 4
          $raw += $charSet.Number | Get-Random -Count 4
          $raw += $charSet.Special | Get-Random -Count 4
          $pwd = -join ($raw | Sort-Object { Get-Random })
          $sec = ConvertTo-SecureString $pwd -AsPlainText -Force

          New-LocalUser -Name "RDP" -Password $sec -AccountNeverExpires -PasswordNeverExpires > $null
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          # إعدادات RDP الدقيقة الناجحة
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall add rule name="RDP-Allow" dir=in action=allow protocol=TCP localport=3389 > $null

          Restart-Service TermService -Force

          # === Tailscale (بديل ngrok/Cloudflared) ===
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installer = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installer
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installer`"", "/quiet", "/norestart" -Wait

          # ربط Tailscale (ضع الـ Auth Key في Secrets)
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-vps-$env:GITHUB_RUN_ID

          # استخراج الـ IP
          Start-Sleep -Seconds 15
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          # إرسال البيانات إلى Discord
          $msg = "✅ VPS جاهز!`nIP: $tsIP`nU: RDP`nP: $pwd`nTool: Tailscale (أفضل من ngrok وCloudflared)"
          $body = @{ content = $msg } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body $body -ContentType "application/json"

          Write-Host "VPS IP: $tsIP | Username: RDP | Password: $pwd"

      - name: Keep VPS Alive (60 ساعة)
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] VPS شغال - Tailscale IP: $env:TAILSCALE_IP"
            Start-Sleep -Seconds 300
          }
